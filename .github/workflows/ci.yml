# Continuous integration and delivery pipeline running quality checks, container build + scan, and dual-region deploy.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9.15.0'

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm exec prisma generate --schema=src/prisma/schema.prisma

      - name: Lint
        run: pnpm lint:check

      - name: Type check
        run: pnpm typecheck

      - name: Test with coverage
        run: pnpm exec jest --coverage --passWithNoTests

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build
        run: pnpm build

  docker:
    name: docker
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: allservices-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: allservices-api:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  deploy-eu:
    name: deploy-eu
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production-eu
    timeout-minutes: 15
    steps:
      - name: Trigger EU deployment
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_EU_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}"}' \
            "${{ secrets.DEPLOY_EU_WEBHOOK }}"

      - name: Wait for EU rollout
        run: sleep 10

      - name: Verify EU health
        run: curl -fsSL --max-time 10 https://api.eu.production.allservices.cc/v1/health/ready

  deploy-na:
    name: deploy-na
    runs-on: ubuntu-latest
    needs: deploy-eu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production-na
    timeout-minutes: 15
    steps:
      - name: Trigger NA deployment
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_NA_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"sha":"${{ github.sha }}"}' \
            "${{ secrets.DEPLOY_NA_WEBHOOK }}"

      - name: Wait for NA rollout
        run: sleep 10

      - name: Verify NA health
        run: curl -fsSL --max-time 10 https://api.na.production.allservices.cc/v1/health/ready

  post-deploy:
    name: post-deploy
    runs-on: ubuntu-latest
    needs: [deploy-eu, deploy-na]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload source maps to Sentry
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          version: ${{ github.sha }}
          sourcemaps: ./dist

      - name: Smoke test EU
        run: |
          curl -fsSL --max-time 10 https://api.eu.production.allservices.cc/v1/health
          curl -fsS -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://api.eu.production.allservices.cc/v1/auth/register | grep -q "422"

      - name: Smoke test NA
        run: |
          curl -fsSL --max-time 10 https://api.na.production.allservices.cc/v1/health
          curl -fsS -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://api.na.production.allservices.cc/v1/auth/register | grep -q "422"
